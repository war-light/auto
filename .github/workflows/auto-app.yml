name: Python application

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: macos-latest
            asset_suffix: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Create and activate virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        source venv/bin/activate
        pip install flake8 pytest pyinstaller
        if [ -f build_requirements.txt ]; then pip install -r build_requirements.txt; fi

    - name: Lint with flake8
      run: |
        source venv/bin/activate
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=./venv/*
        flake8 . --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics --exclude=./venv/*

    - name: Build with pyinstaller
      run: |
        source venv/bin/activate
        pyinstaller --collect-all pyfiglet \
                    --collect-submodules rich \
                    --collect-all autocli \
                    --hidden-import "rich._unicode_data.unicode17-0-0" \
                    --hidden-import "charset_normalizer" \
                    --hidden-import "chardet" \
                    --onefile ./auto/auto.py

    - name: List dist directory
      run: ls -l dist/

    - name: Create distribution directory
      run: |
        # Stage release files under an arch-tagged directory so the tarball is unambiguous
        STAGE=release/auto-${{ github.ref_name }}-${{ matrix.asset_suffix }}
        mkdir -p "$STAGE"
        cp dist/auto "$STAGE/"
        cp -r auto/config "$STAGE/"
        cp -r auto/k3s "$STAGE/"
        cp README.md "$STAGE/"

    - name: Create tar.gz archive
      run: |
        tar -czvf auto-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz \
            -C release auto-${{ github.ref_name }}-${{ matrix.asset_suffix }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: auto-${{ github.ref_name }}-${{ matrix.asset_suffix }}
        path: auto-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List downloaded artifacts
      run: ls -l artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          artifacts/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
